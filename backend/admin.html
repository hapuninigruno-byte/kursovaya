<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><title>Админ-панель</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; padding: 20px; }
        .card { background: white; color: #333; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; color: #333; }
        td, th { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .cell-add { color: #ccc; cursor: pointer; font-size: 24px; }
        .cell-del { background: #ffe082; cursor: pointer; font-size: 11px; }
        input, select { padding: 8px; margin: 5px 2px; width: 130px; border-radius: 4px; border: 1px solid #ccc; }
        button { padding: 8px 15px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>🔐 Скрытая админка (4 пары + ФИО)</h2>
    <div class="card">
        <input id="p" type="password" placeholder="Пароль"> | 
        <input id="gn" placeholder="Название класса"> <button onclick="addG()">Создать класс</button>
        <hr>
        Класс: <select id="gs" onchange="load()"></select> | 
        <input id="sub" placeholder="Предмет"> <input id="rm" placeholder="Каб."> <input id="fio" placeholder="ФИО препода">
    </div>
    <table>
        <thead><tr><th>Пара</th><th>Пн</th><th>Вт</th><th>Ср</th><th>Чт</th><th>Пт</th></tr></thead>
        <tbody id="b"></tbody>
    </table>
    <script>
        async function load() {
            const gr = await (await fetch('/groups')).json();
            const s = document.getElementById('gs');
            if(!s.options.length) s.innerHTML = gr.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
            if(!s.value) return;
            const ls = await (await fetch('/schedule/' + s.value)).json();
            const b = document.getElementById('b'); b.innerHTML = '';
            for(let n=1; n<=4; n++) {
                let r = `<tr><td>Пара ${n}</td>`;
                for(let d=1; d<=5; d++) {
                    const l = ls.find(x => x.lesson_number == n && x.day_of_week == d);
                    r += l ? `<td class="cell-del" onclick="del(${l.id})"><b>${l.subject}</b><br>${l.room}<br>${l.teacher}</td>` : `<td class="cell-add" onclick="add(${n},${d})">+</td>`;
                }
                b.innerHTML += r + '</tr>';
            }
        }
        async function addG() {
            await fetch('/groups', {method:'POST', headers:{'Content-Type':'application/json','x-password':document.getElementById('p').value}, body:JSON.stringify({name:document.getElementById('gn').value})});
            location.reload();
        }
        async function add(n,d) {
            const body = {subject:document.getElementById('sub').value, room:document.getElementById('rm').value, teacher:document.getElementById('fio').value || '-', lesson_number:n, day_of_week:d, group_id:document.getElementById('gs').value};
            const res = await fetch('/lessons', {method:'POST', headers:{'Content-Type':'application/json','x-password':document.getElementById('p').value}, body:JSON.stringify(body)});
            if(res.ok) load(); else alert("Ошибка пароля");
        }
        async function del(id) {
            if(!confirm("Удалить?")) return;
            const res = await fetch('/lessons/'+id, {method:'DELETE', headers:{'x-password':document.getElementById('p').value}});
            if(res.ok) load();
        }
        load();
    </script>
</body>
</html>
